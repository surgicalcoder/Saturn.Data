# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- master

pool:
  vmImage: 'Ubuntu-16.04'

steps:
- task: UseDotNet@2
  displayName: 'Use .NET Core sdk'
  inputs:
    packageType: sdk
    version: 3.x
    installationPath: $(Agent.ToolsDirectory)/dotnet
- script: dotnet build GoLive.Saturn.Data/GoLive.Saturn.Data.csproj
- script: dotnet publish GoLive.Saturn.Data/GoLive.Saturn.Data.csproj --output $(Build.ArtifactStagingDirectory)
- script: dotnet pack GoLive.Saturn.Data/GoLive.Saturn.Data.csproj /p:PackageVersion=$(version) --output $(Build.ArtifactStagingDirectory)
- task: PublishBuildArtifacts@1